<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Chat with Bengali LLM — Fine-tuned model for Bengali language understanding, by Calcutta University Data Science Lab." />
  <title>Bengali LLM Chat | CU Data Science Lab</title>
  <link rel="stylesheet" href="../styles/styles.css" />
  <link rel="stylesheet" href="../styles/chat.css" />
</head>
<body class="chat-page">

<!-- ── Background Blobs ──────────────────────────────────── -->
<div class="bg-blobs" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- ── Chat Navbar ────────────────────────────────────────── -->
<nav class="chat-navbar" aria-label="Chat navigation">
  <div class="container chat-nav-inner">
    <div class="chat-nav-left">
      <a href="/pages/index.html" class="chat-nav-back" id="chat-back-btn" aria-label="Back to home">
        ← Home
      </a>
      <div class="chat-title-area">
        <div class="chat-model-dot" aria-hidden="true"></div>
        <div>
          <h1>Bengali LLM</h1>
        </div>
      </div>
    </div>
    <div class="chat-nav-right">
      <button class="chat-action-btn" id="clear-chat-btn" aria-label="Clear conversation">
        🗑️ <span>Clear</span>
      </button>
    </div>
  </div>
</nav>

<!-- ── Chat App Shell ─────────────────────────────────────── -->
<div class="chat-app">

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="chat-sidebar" aria-label="Conversation history">
    <div class="sidebar-header">
      <h2>Conversations</h2>
      <button class="new-chat-btn" id="new-chat-btn" aria-label="Start new conversation">
        + New Chat
      </button>
    </div>

    <div class="sidebar-list" id="sidebar-list" role="list">
      <div class="sidebar-group-label">Today</div>
      <div class="sidebar-item active" role="listitem" id="convo-1" data-convo="1" tabindex="0">
        <div class="sidebar-item-icon">💬</div>
        <div class="sidebar-item-text">
          <span>New Conversation</span>
        </div>
        <span class="sidebar-item-time">Now</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="model-info-box">
        <div class="model-name">Bengali LLM v1.0</div>
        <div class="model-status">
          <div class="status-dot"></div>
          <span id="model-status-text">Connected</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Chat Main ────────────────────────────────────────── -->
  <main class="chat-main" aria-label="Chat messages">

    <!-- Messages Area -->
    <div class="messages-area" id="messages-area" role="log" aria-live="polite" aria-label="Conversation">
      <div class="container">

        <!-- Welcome Screen -->
        <div class="chat-welcome" id="chat-welcome">
          <div class="welcome-icon" aria-hidden="true">🤖</div>
          <h2>নমস্কার! <span class="gradient-text">Hello!</span></h2>
          <p>
            I'm the Bengali LLM developed by the <strong>Calcutta University Data Science Lab</strong>.
            Ask me anything in Bengali or English — I understand both!
          </p>
          <div class="suggestion-chips" role="list" aria-label="Suggested prompts">
            <button class="chip" id="chip-1" role="listitem">বাংলা ভাষার ইতিহাস বলুন</button>
            <button class="chip" id="chip-2" role="listitem">রবীন্দ্রনাথ ঠাকুর সম্পর্কে বলুন</button>
            <button class="chip" id="chip-3" role="listitem">আজকের আবহাওয়া কেমন?</button>
            <button class="chip" id="chip-4" role="listitem">Tell me about Bengali culture</button>
            <button class="chip" id="chip-5" role="listitem">কলকাতার বিখ্যাত খাবার কী কী?</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area" role="group" aria-label="Message input">
      <div class="container input-wrapper">
        <div class="input-box">
          <div class="input-row">
            <textarea
              id="chat-input"
              placeholder="বাংলায় বা ইংরেজিতে প্রশ্ন করুন... (Ask in Bengali or English)"
              rows="1"
              aria-label="Type your message"
              autocomplete="off"
              spellcheck="false"
            ></textarea>
            <button id="send-btn" aria-label="Send message" disabled>
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
              </svg>
            </button>
          </div>
          <div class="input-toolbar">
            <div class="toolbar-left">
              <div class="lang-toggle" role="group" aria-label="Language preference">
                <button class="lang-btn active" id="lang-both" aria-pressed="true">Both</button>
                <button class="lang-btn" id="lang-bn" aria-pressed="false">বাংলা</button>
                <button class="lang-btn" id="lang-en" aria-pressed="false">English</button>
              </div>
              <button class="toolbar-btn" id="toolbar-clear-btn" title="Clear input">
                ✕ Clear
              </button>
            </div>
            <div class="input-hint">
              <kbd>Enter</kbd> to send · <kbd>Shift</kbd>+<kbd>Enter</kbd> for new line
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>




<script src="../scripts/chat.js"></script>
</body>
</html>
